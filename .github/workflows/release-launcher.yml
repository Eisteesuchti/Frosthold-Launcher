# Baut den FrostholdRP-Installer und laedt ihn als GitHub Release hoch (latest.yml fuer electron-updater).
# Kein GH_TOKEN auf deinem Rechner noetig — nutzt secrets.GITHUB_TOKEN im Repo.
#
# Ablauf: Version in FrostholdRP-Launcher/package.json erhoehen, committen, pushen,
# dann in GitHub → Actions → „Release Launcher“ → Run workflow.

name: Release Launcher

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: FrostholdRP-Launcher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FrostholdRP-Launcher/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish
